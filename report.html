<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC Machine Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #080c14;
  color: #e0e6f4;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: #0b1120;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 13px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-icon { font-size: 1.3rem; color: #f59e0b; }
header h1 { font-size: 1.15rem; font-weight: 700; color: #e2e8f0; }
header p  { font-size: 0.78rem; color: #4a5a80; margin-top: 1px; }
.nav-links { margin-left: auto; display: flex; gap: 8px; }
.nav-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #8090c0;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.82rem;
  text-decoration: none;
  transition: all 0.15s;
}
.nav-btn:hover { background: rgba(255,255,255,0.09); color: #b0c0e0; }
#auto-refresh-btn.active { border-color: rgba(34,197,94,0.5); color: #22c55e; background: rgba(34,197,94,0.08); }

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  height: calc(100vh - 61px);
}

/* ── Sidebar ── */
.sidebar {
  background: #0d1525;
  border-right: 1px solid rgba(255,255,255,0.06);
  overflow-y: auto;
  padding: 14px 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.sidebar-label {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: .09em;
  color: #3a4870;
  padding: 0 6px 8px;
}
.cam-btn {
  background: #111a2e;
  border: 1px solid #1a2545;
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}
.cam-btn:hover  { background: #162038; border-color: #2a3860; }
.cam-btn.active { background: #182560; border-color: #3050c0; }
.cam-btn .cam-name { font-size: 0.86rem; font-weight: 600; }
.cam-btn .cam-meta { font-size: 0.72rem; color: #4a5a80; margin-top: 3px; }
.cam-badge {
  display: inline-block;
  font-size: 0.65rem;
  padding: 1px 6px;
  border-radius: 4px;
  margin-top: 5px;
  font-weight: 600;
}
.cam-badge.cal  { background: rgba(0,200,120,0.12); color: #00c878; border: 1px solid rgba(0,200,120,0.25); }
.cam-badge.uncal{ background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.25); }

/* ── Main area ── */
.main {
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.section-title {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: .09em;
  color: #4a5a80;
  margin-bottom: 12px;
}

/* ── Summary cards ── */
.summary-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 12px;
}
.sum-card {
  background: #0e1a2e;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 14px 16px;
  text-align: center;
}
.sum-card .sc-val  { font-size: 1.6rem; font-weight: 700; line-height: 1; }
.sum-card .sc-label{ font-size: 0.72rem; color: #4a5a80; margin-top: 4px; }
.sc-working  .sc-val { color: #22c55e; }
.sc-idle     .sc-val { color: #f59e0b; }
.sc-stop     .sc-val { color: #ef4444; }
.sc-finish   .sc-val { color: #00d4ff; }
.sc-off      .sc-val { color: #4a5a80; }

/* ── Machine table ── */
.panel {
  background: #0e1a2e;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  overflow: hidden;
}
.panel-head {
  background: #111e35;
  padding: 12px 18px;
  font-size: 0.78rem;
  font-weight: 600;
  color: #7090c0;
  letter-spacing: .04em;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
table {
  width: 100%;
  border-collapse: collapse;
}
th {
  text-align: left;
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: #3a4870;
  padding: 9px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
td {
  padding: 11px 14px;
  font-size: 0.84rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* State badge */
.state-badge {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
}
.st-working  { background: rgba(34,197,94,0.15);  color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.st-idle     { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
.st-manual_stop { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.st-process_finish { background: rgba(0,212,255,0.15); color: #00d4ff; border: 1px solid rgba(0,212,255,0.3); }
.st-off      { background: rgba(100,116,139,0.15); color: #64748b; border: 1px solid rgba(100,116,139,0.25); }

/* Duration */
.duration { font-size: 0.82rem; color: #8090b0; }
.duration strong { color: #c0d0f0; }

/* Today bar */
.today-bar-wrap { min-width: 120px; }
.today-bar {
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  background: #0a1020;
  display: flex;
  width: 100%;
}
.bar-seg { height: 100%; transition: width 0.4s; }
.bar-working  { background: #22c55e; }
.bar-idle     { background: #f59e0b; }
.bar-stop     { background: #ef4444; }
.bar-finish   { background: #00d4ff; }
.bar-off      { background: #1e2a40; }
.today-text {
  font-size: 0.68rem;
  color: #3a4870;
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── History panel (per machine) ── */
.hist-section { padding: 0; }
.hist-machine {
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.hist-machine:last-child { border-bottom: none; }
.hist-machine-header {
  padding: 11px 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.84rem;
  font-weight: 600;
  user-select: none;
  transition: background 0.12s;
}
.hist-machine-header:hover { background: rgba(255,255,255,0.03); }
.hist-machine-header .arrow { color: #3a4870; font-size: 0.7rem; transition: transform 0.2s; margin-left: auto; }
.hist-machine-header.open .arrow { transform: rotate(90deg); }
.hist-body { display: none; padding: 0 18px 12px; }
.hist-body.open { display: block; }

.hist-table { width: 100%; border-collapse: collapse; }
.hist-table th {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: #3a4870;
  padding: 6px 10px;
  text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.hist-table td {
  padding: 7px 10px;
  font-size: 0.78rem;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: #8090b0;
}
.hist-table td:first-child { color: #c0d0f0; }
.hist-table tr:last-child td { border-bottom: none; }

.no-data { padding: 40px; text-align: center; color: #2a3860; font-size: 0.88rem; }
.spinner {
  width: 22px; height: 22px;
  border: 2px solid #1a2545;
  border-top-color: #3050c0;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.refresh-info { font-size: 0.72rem; color: #3a4870; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">📊</div>
    <div>
      <h1>Machine State Report</h1>
      <p>Per-machine ON/OFF duration tracking — calibrated lights only</p>
    </div>
  </div>
  <div class="nav-links">
    <span class="refresh-info" id="refresh-info">—</span>
    <button class="nav-btn" id="window-btn" onclick="toggleWindow()" title="Switch between today and last 8-hour shift">📅 Today</button>
    <button class="nav-btn" id="export-btn" onclick="exportCSV()" title="Download CSV">⬇ CSV</button>
    <button class="nav-btn active" id="auto-refresh-btn" onclick="toggleAutoRefresh()">⟳ Auto</button>
    <a href="/calibrate" class="nav-btn">🎯 Calibrate</a>
    <a href="/" class="nav-btn">← Dashboard</a>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-label">Cameras</div>
    <div id="cam-list"><div class="spinner"></div></div>
  </div>

  <div class="main" id="main-area">
    <div class="no-data">Select a camera from the left panel to view machine reports.</div>
  </div>
</div>

<script>
let cameras     = {};
let calibration = {};
let activeChannel = null;
let autoRefresh = true;
let refreshTimer = null;
let summaryWindow = 'today';   // 'today' | 'shift'
let lastReport    = null;
const REFRESH_MS  = 5000;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/api/cameras');
    const j = await r.json();
    cameras = j.cameras || {};
    const rc = await fetch('/api/calibration');
    if (rc.ok) calibration = await rc.json();
    renderCamList();
    // Auto-select first calibrated camera
    const first = Object.keys(cameras).find(ch => calibration[ch]?.length > 0)
                  || Object.keys(cameras)[0];
    if (first) selectCamera(first);
  } catch(e) {
    document.getElementById('cam-list').innerHTML =
      `<div style="color:#ff6060;font-size:.8rem;padding:8px">⚠ ${e.message}</div>`;
  }
}

function renderCamList() {
  const el = document.getElementById('cam-list');
  el.innerHTML = Object.keys(cameras).map(ch => {
    const cam = cameras[ch];
    const cal = calibration[ch]?.length > 0;
    return `<div class="cam-btn ${activeChannel==ch?'active':''}" onclick="selectCamera('${ch}')">
      <div class="cam-name">${cam.name || 'Camera '+ch}</div>
      <div class="cam-meta">CH ${ch}</div>
      <span class="cam-badge ${cal?'cal':'uncal'}">${cal ? '✓ CAL' : '⚠ UNCAL'}</span>
    </div>`;
  }).join('') || '<div style="color:#3a4870;font-size:.8rem;padding:8px">No cameras</div>';
}

async function selectCamera(ch) {
  activeChannel = ch;
  renderCamList();
  clearInterval(refreshTimer);
  await loadReport(ch);
  if (autoRefresh) refreshTimer = setInterval(() => loadReport(ch), REFRESH_MS);
}

async function loadReport(ch) {
  if (!ch) return;
  try {
    const r = await fetch(`/api/report/${ch}`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    lastReport = await r.json();
    renderReport(lastReport);
    document.getElementById('refresh-info').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-GB', {hour12: false});
  } catch(e) {
    document.getElementById('main-area').innerHTML =
      `<div class="no-data">⚠ ${e.message}</div>`;
  }
}

function toggleWindow() {
  summaryWindow = summaryWindow === 'today' ? 'shift' : 'today';
  document.getElementById('window-btn').textContent =
    summaryWindow === 'today' ? '📅 Today' : '🕗 Shift (8h)';
  if (lastReport) renderReport(lastReport);
}

function exportCSV() {
  if (!activeChannel) return;
  window.location.href = `/api/export/${activeChannel}.csv`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderReport(data) {
  const machines = data.machines || [];
  const area = document.getElementById('main-area');

  if (!data.calibrated || !machines.length) {
    area.innerHTML = `<div class="no-data">
      Camera <strong>${data.cam_name}</strong> is not calibrated yet.<br>
      <a href="/calibrate" style="color:#3060d0;margin-top:8px;display:inline-block">
        Go to Calibrate →</a>
    </div>`;
    return;
  }

  // ── Camera-level summary (sum across all machines, selected window) ─────────
  const summaryKey = summaryWindow === 'shift' ? 'shift_summary' : 'today_summary';
  const windowLabel = summaryWindow === 'shift' ? 'Last 8-Hour Shift' : "Today";
  const totals = { working:0, idle:0, manual_stop:0, process_finish:0, off:0 };
  machines.forEach(m => {
    const s = m[summaryKey] || {};
    Object.keys(totals).forEach(k => { totals[k] += (s[k] || 0); });
  });

  const summaryHtml = `
<div>
  <div class="section-title">${windowLabel} — ${data.cam_name} (${machines.length} machines)</div>
  <div class="summary-row">
    <div class="sum-card sc-working">
      <div class="sc-val">${fmtHM(totals.working / machines.length)}</div>
      <div class="sc-label">Avg Working</div>
    </div>
    <div class="sum-card sc-idle">
      <div class="sc-val">${fmtHM(totals.idle / machines.length)}</div>
      <div class="sc-label">Avg Idle</div>
    </div>
    <div class="sum-card sc-stop">
      <div class="sc-val">${fmtHM(totals.manual_stop / machines.length)}</div>
      <div class="sc-label">Avg Stopped</div>
    </div>
    <div class="sum-card sc-finish">
      <div class="sc-val">${fmtHM(totals.process_finish / machines.length)}</div>
      <div class="sc-label">Avg Finish</div>
    </div>
    <div class="sum-card sc-off">
      <div class="sc-val">${fmtHM(totals.off / machines.length)}</div>
      <div class="sc-label">Avg Off</div>
    </div>
    ${(() => {
      const active = totals.working + totals.idle + totals.manual_stop + totals.process_finish;
      const util = active > 0 ? Math.round(totals.working / active * 100) : null;
      const col = util === null ? '#4a5a80' : util >= 70 ? '#22c55e' : util >= 40 ? '#f59e0b' : '#ef4444';
      return `<div class="sum-card" style="border-color:${col}33">
        <div class="sc-val" style="color:${col}">${util !== null ? util + '%' : '—'}</div>
        <div class="sc-label">Floor Utilization</div>
      </div>`;
    })()}
  </div>
</div>`;

  // ── Live status table ─────────────────────────────────────────────────────
  const tableRows = machines.map((m, idx) => {
    const s = m[summaryKey] || {};
    const total = Object.values(s).reduce((a,b)=>a+b,0) || 1;
    const pct = k => ((s[k]||0) / total * 100).toFixed(1);

    // Utilization = working / (working + idle + stop + finish)  — excludes "off"
    const activeTotal = (s.working||0) + (s.idle||0) + (s.manual_stop||0) + (s.process_finish||0);
    const utilPct = activeTotal > 0 ? Math.round((s.working||0) / activeTotal * 100) : null;
    const utilColor = utilPct === null ? '#3a4870'
                    : utilPct >= 70    ? '#22c55e'
                    : utilPct >= 40    ? '#f59e0b'
                    : '#ef4444';

    const activityText = [
      s.working     ? `W:${fmtHM(s.working)}`    : '',
      s.idle        ? `I:${fmtHM(s.idle)}`        : '',
      s.manual_stop ? `S:${fmtHM(s.manual_stop)}` : '',
      s.off         ? `Off:${fmtHM(s.off)}`       : '',
    ].filter(Boolean).join('  ');

    return `<tr>
      <td><strong>${escHtml(m.label)}</strong></td>
      <td><span class="state-badge st-${m.current_state}">${fmtState(m.current_state)}</span></td>
      <td class="duration"><strong>${fmtDuration(m.duration_sec)}</strong><br>
        <span style="font-size:.68rem;color:#3a4870">since ${fmtTime(m.state_since)}</span></td>
      <td style="font-size:1.1rem;font-weight:700;color:${utilColor};text-align:center">
        ${utilPct !== null ? utilPct + '%' : '—'}<br>
        <span style="font-size:.65rem;color:#3a4870;font-weight:400">utilization</span>
      </td>
      <td>
        <div class="today-bar-wrap">
          <div class="today-bar">
            <div class="bar-seg bar-working"  style="width:${pct('working')}%"></div>
            <div class="bar-seg bar-idle"     style="width:${pct('idle')}%"></div>
            <div class="bar-seg bar-stop"     style="width:${pct('manual_stop')}%"></div>
            <div class="bar-seg bar-finish"   style="width:${pct('process_finish')}%"></div>
            <div class="bar-seg bar-off"      style="width:${pct('off')}%"></div>
          </div>
          <div class="today-text">${activityText || '—'}</div>
        </div>
      </td>
    </tr>`;
  }).join('');

  const tableHtml = `
<div class="panel">
  <div class="panel-head">⚡ Live Machine Status</div>
  <table>
    <thead><tr>
      <th>Machine</th><th>State</th><th>In State For</th><th>Utilization</th><th>Activity</th>
    </tr></thead>
    <tbody>${tableRows}</tbody>
  </table>
</div>`;

  // ── History accordion ─────────────────────────────────────────────────────
  const histItems = machines.map((m, idx) => {
    const hist = [...(m.history || [])].reverse(); // most recent first
    const histRows = hist.length
      ? hist.slice(0, 100).map(h => `<tr>
          <td>${fmtTime(h.start)}</td>
          <td>${fmtTime(h.end)}</td>
          <td><span class="state-badge st-${h.state}" style="font-size:.65rem">${fmtState(h.state)}</span></td>
          <td>${fmtDuration(h.duration_sec)}</td>
        </tr>`).join('')
      : `<tr><td colspan="4" style="color:#3a4870;text-align:center;padding:12px">
           No history yet — machine has been in its current state since monitoring started
         </td></tr>`;

    return `<div class="hist-machine">
      <div class="hist-machine-header" onclick="toggleHist(${idx})">
        <span class="state-badge st-${m.current_state}" style="font-size:.65rem">${fmtState(m.current_state)}</span>
        <span>${escHtml(m.label)}</span>
        <span style="color:#4a5a80;font-size:.72rem">${hist.length} events today</span>
        <span class="arrow" id="arrow-${idx}">▶</span>
      </div>
      <div class="hist-body" id="hist-${idx}">
        <table class="hist-table">
          <thead><tr><th>From</th><th>To</th><th>State</th><th>Duration</th></tr></thead>
          <tbody>${histRows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  const histHtml = `
<div class="panel">
  <div class="panel-head">📋 State Change History (most recent first, per machine)</div>
  <div class="hist-section">${histItems}</div>
</div>`;

  area.innerHTML = summaryHtml + tableHtml + histHtml;
}

function toggleHist(idx) {
  const body   = document.getElementById('hist-' + idx);
  const header = body.previousElementSibling;
  const arrow  = document.getElementById('arrow-' + idx);
  const open = body.classList.toggle('open');
  header.classList.toggle('open', open);
  arrow.textContent = open ? '▼' : '▶';
}

// ── Auto-refresh ──────────────────────────────────────────────────────────────
function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('auto-refresh-btn');
  btn.classList.toggle('active', autoRefresh);
  clearInterval(refreshTimer);
  if (autoRefresh && activeChannel) {
    refreshTimer = setInterval(() => loadReport(activeChannel), REFRESH_MS);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtDuration(sec) {
  sec = Math.round(sec || 0);
  if (sec < 60)  return sec + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm ' + (sec%60) + 's';
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  return h + 'h ' + m + 'm';
}
function fmtHM(sec) {
  sec = Math.round(sec || 0);
  if (sec < 60) return '0m';
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
}
function fmtTime(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleTimeString('en-GB', {hour12:false}); } catch(_) { return iso; }
}
function fmtState(s) {
  return { working:'Working', idle:'Idle', manual_stop:'Manual Stop',
           process_finish:'Process Finish', off:'Off' }[s] || s;
}
function escHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(String(str)));
  return d.innerHTML;
}

init();
</script>
</body>
</html>
